name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Formatting
        run: zig fmt .

      - name: Build
        run: zig build --summary all

      - name: Docs
        run: zig build docs --summary all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: zig-out/docs

  tests:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Zig
        uses: jassielof/setup-zig@v1

      - name: Tests
        run: zig build tests --summary all

  pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
